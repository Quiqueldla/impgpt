<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPGPT</title>

<style>
:root{
    --green: #1de9b6;
    --blue: #0a3d62;
    --dark: #05090c;
    --text: #e6f1f5;
    --muted: #8faab3;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(145deg,rgb(1, 1, 56), rgb(1, 94, 1));
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.chat{
    width: 95%;
    max-width: 650px;
    height: 450px;
    background: linear-gradient(180deg, #0e1b21, #071014);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,.7);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.messages{
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.msg{
    max-width: 80%;
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: 14px;
    line-height: 1.4;
    font-size: 14px;
}

.bot{
    background: rgba(29,233,182,.12);
    border-left: 3px solid rgb(28, 211, 83);
    color: var(--text);
}

.user{
    background: rgba(10,61,98,.4);
    color: var(--text);
    margin-left: auto;
    text-align: right;
}

.input-area{
    display: flex;
    padding: 15px;
    background: #0c181c;
    border-top: 1px solid rgba(255,255,255,.05);
}

.input-area input{
    flex: 1;
    background: #071014;
    border: none;
    outline: none;
    padding: 12px 14px;
    border-radius: 12px;
    color: var(--text);
}

.input-area input::placeholder{
    color: var(--muted);
}

.input-area button{
    margin-left: 10px;
    padding: 0 18px;
    border-radius: 12px;
    border: none;
    background:linear-gradient(135deg,rgb(1, 94, 1),rgb(28, 211, 83)) ;
    color: #001;
    font-size: 15px;
    cursor: pointer;
}
.robot{
    animation: pulse 2s ease-in-out infinite;
    position: fixed;
    bottom: 20px;
    right: 20px;
}
.head{
    width: 120px;
    height: 90px;
    background: linear-gradient(135deg,rgb(1, 1, 56),rgb(1, 1, 88));
    border-radius: 20px;
    position: relative;
    margin: auto;
}
.eye-right{
    width: 18px;
    height: 18px;
    background: rgb(1, 94, 1);
    border-radius: 50%;
    position: absolute;
    top: 30px;
    animation: blink 4s infinite;

}
.eye-left{
    width: 18px;
    height: 18px;
    background:  rgb(1, 94, 1);
    border-radius: 50%;
    position: absolute;
    top: 30px;
    animation: blink 4s infinite;
}
.eye-left{ left: 30px;}
.eye-right{ right: 30px;}

@keyframes blink{
    0%, 95%, 100%{transform: scaleY(1);}
    97%{ transform: scaleY(0.1);}
}
@keyframes pulse{
    0% {transform: scale(1);}
     50% {transform: scaleY(1.05);}
      100% {transform: scaleY(  );}
   
}
@keyframes fadeInOut{
    0% {opacity: 0;}
     50% {opacity: 1;}
      100% {opacity: 1;}
    
}
@keyframes fadeIn{
    0%{opacity: 0;transform: translateX(-150%);}
    100%{opacity: 1; transform: translateX(-50);}
}

.body{
    width: 160px;
    height: 140px;
    background: rgb(1, 1, 56);
    border-radius: 20px;
    margin: 12px auto;
    border: 2px solid #0ee66f;
    
}
.mouth{
    width: 40px;
    height: 6px;
    background: rgb(1, 94, 1);
    border-radius: 10px;
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);


}
.texto{
    position: absolute;
    top: 1cm;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
font-family:'Roboto',sans-serif;
color: rgb(28, 211, 83);
animation: fadeIn 2s forwards;
}

</style>
</head>

<body>
<div class="texto">  IMPGPT</div>
<div class="chat">
    <div class="messages" id="messages">
        <div class="msg bot">Olá 👋 Como posso ajudar?</div>
    </div>

    <div class="input-area">
        <input type="text" id="text" placeholder="Digite a sua mensagem..." onkeydown="enterSend(event)">

        <button onclick="send()">Enviar</button>
    </div>
</div>
<div class="robot">
    <div class="head">
         <div class="eye-right"></div>
         <div class="eye-left"></div>
         <div class="mouth"></div>
    </div>
    <div class="body"></div>


<script>

const API_KEY = "AQ.Ab8RN6J8Wsb-W01GIeDaddL8WhNbBwOWFP14x4yVTWcNIVxyhA";

function enterSend(event){
    if(event.key === "Enter"){
        send();
    }
}

const texto = document.getElementById("texto");

if(texto){
    texto.style.animation = "fadeInOut 2s ease-in-out forwards";

    setTimeout(() => {
        texto.style.opacity = "0";
    }, 5000);
}

async function procurarResposta(pergunta){

    const userText = pergunta.toLowerCase();

    const respostas = [

        {
            palavras:["cursos","imptel"],
            resposta:"O IMPTEL disponibiliza cursos técnicos e profissionais. Para mais informações consulte a secretaria académica."
        },

        {
            palavras:["curso","imptel"],
            resposta:"O IMPTEL disponibiliza cursos técnicos e profissionais. Para mais informações consulte a secretaria académica."
        },

        {
            palavras:["matricula","imptel"],
            resposta:"As matrículas no IMPTEL são realizadas durante os períodos definidos pela instituição."
        },

        {
            palavras:["matrícula","imptel"],
            resposta:"As matrículas no IMPTEL são realizadas durante os períodos definidos pela instituição."
        },

        {
            palavras:["onde fica","imptel"],
            resposta:"O IMPTEL localiza-se em Luanda, Angola."
        },

        {
            palavras:["localização","imptel"],
            resposta:"O IMPTEL localiza-se em Luanda, Angola."
        },

        {
            palavras:["telefone","imptel"],
            resposta:"Para informações oficiais contacte a secretaria do IMPTEL."
        },

        {
            palavras:["contacto","imptel"],
            resposta:"Para informações oficiais contacte a secretaria do IMPTEL."
        },

        {
            palavras:["quem és"],
            resposta:"Sou a IMPGPT, assistente virtual oficial do IMPTEL."
        },

        {
            palavras:["bom dia"],
            resposta:"Bom dia 😊 Seja bem-vindo ao IMPTEL. Como posso ajudar?"
        },

        {
            palavras:["boa tarde"],
            resposta:"Boa tarde 😊 Seja bem-vindo ao IMPTEL. Como posso ajudar?"
        },

        {
            palavras:["boa noite"],
            resposta:"Boa noite 😊 Seja bem-vindo ao IMPTEL. Como posso ajudar?"
        },

        {
            palavras:["olá"],
            resposta:"Olá 👋 Sou a IMPGPT, assistente virtual do IMPTEL. Como posso ajudar?"
        },

        {
            palavras:["ola"],
            resposta:"Olá 👋 Sou a IMPGPT, assistente virtual do IMPTEL. Como posso ajudar?"
        }

    ];

    for(const item of respostas){

        const encontrou = item.palavras.every(
            palavra => userText.includes(palavra)
        );

        if(encontrou){
            return item.resposta;
        }
    }

    // Respostas genéricas

    if(userText.includes("imptel")){
        return "O IMPTEL é uma instituição de ensino técnico dedicada à formação académica e profissional dos jovens angolanos.";
    }

    if(userText.includes("curso") || userText.includes("cursos")){
        return "O IMPTEL disponibiliza cursos técnicos e profissionais.";
    }

    if(userText.includes("professor") || userText.includes("professores")){
        return "O IMPTEL possui um corpo docente qualificado e comprometido com a formação dos estudantes.";
    }

    if(userText.includes("horário") || userText.includes("horario")){
        return "Os horários académicos são divulgados pela direção pedagógica.";
    }

    // GEMINI

    try{

        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    contents:[
                        {
                            parts:[
                                {
                                    text:`Você é a IMPGPT, assistente virtual oficial do IMPTEL. Responda de forma educada, profissional e objetiva. Pergunta: ${pergunta}`
                                }
                            ]
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        if(
            data.candidates &&
            data.candidates[0] &&
            data.candidates[0].content &&
            data.candidates[0].content.parts
        ){
            return data.candidates[0].content.parts[0].text;
        }

        return "Desculpe, não consegui responder à sua pergunta.";

    }catch(error){

        return "Erro ao comunicar com a IA.";
    }
}

async function send(){

    const input = document.getElementById("text");
    const messages = document.getElementById("messages");

    if(input.value.trim() === ""){
        return;
    }

    const pergunta = input.value;

    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.textContent = pergunta;

    messages.appendChild(userMsg);

    input.value = "";

    messages.scrollTop = messages.scrollHeight;

    const loading = document.createElement("div");
    loading.className = "msg bot";
    loading.textContent = "IMPGPT está a escrever...";

    messages.appendChild(loading);

    messages.scrollTop = messages.scrollHeight;

    const resposta = await procurarResposta(pergunta);

    loading.remove();

    const botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    botMsg.textContent = resposta;

    messages.appendChild(botMsg);

    messages.scrollTop = messages.scrollHeight;
}

</script>

</body>



</body>
</html>
